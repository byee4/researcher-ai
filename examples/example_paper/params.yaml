# nf-core/clipseq params — alternative Nextflow backend
# Generated by researcher-ai from PMID 26971820 (Van Nostrand et al. 2016)
#
# Usage: nextflow run nf-core/clipseq -r 1.0.0 -params-file params.yaml
#
# Download samplesheet template:
#   nf-core launch nf-core/clipseq

# ── Required ──────────────────────────────────────────────────────────────────
input: "samplesheet.csv"          # See samplesheet format below
outdir: "results/"
genome: "GRCh37"                  # Paper used hg19 = GRCh37

# ── Adapter trimming ──────────────────────────────────────────────────────────
clip_r1: "AGATCGGAAGAGC"
clip_r2: "AGATCGGAAGAGC"
minimum_length: 18
quality_cutoff: 6

# ── STAR alignment ────────────────────────────────────────────────────────────
star_index: null                  # Will be auto-built from genome if not provided
outFilterMultimapNmax: 1          # Paper parameter: unique alignments only

# ── Peak calling ──────────────────────────────────────────────────────────────
peakcaller: "clipper"

# ── Execution ─────────────────────────────────────────────────────────────────
max_cpus: 16
max_memory: "128.GB"
max_time: "48.h"

# ── Samplesheet format (CSV) ──────────────────────────────────────────────────
# sample,fastq_1,fastq_2,control
# HNRNPC_rep1,GSE77695/HNRNPC_rep1_R1.fastq.gz,GSE77695/HNRNPC_rep1_R2.fastq.gz,HNRNPC_input
# HNRNPC_input,GSE77695/HNRNPC_input_R1.fastq.gz,GSE77695/HNRNPC_input_R2.fastq.gz,
