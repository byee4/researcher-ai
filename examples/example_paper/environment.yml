# Conda environment for eCLIP-seq pipeline reproduction
# Generated by researcher-ai from PMID 26971820 (Van Nostrand et al. 2016)
#
# Create:  conda env create -f environment.yml
# Activate: conda activate eclip_pipeline

name: eclip_pipeline

channels:
  - bioconda
  - conda-forge
  - defaults

dependencies:
  # ── Core alignment & QC ───────────────────────────────────────────────────
  - star=2.7.11a         # STAR aligner (paper used 2.4.0j; 2.7.x is compatible)
  - cutadapt=4.6         # Adapter trimming (paper used 1.9; 4.x API-compatible)
  - fastqc=0.12.1
  - multiqc=1.21
  - samtools=1.19

  # ── UMI handling ──────────────────────────────────────────────────────────
  - umi_tools=1.1.5      # Replaces the paper's custom UMI deduplication script

  # ── Utilities ─────────────────────────────────────────────────────────────
  - sra-tools=3.1.0      # For downloading from SRA/GEO
  - pigz=2.8
  - pysradb=2.1.0        # Python GEO/SRA metadata API

  # ── Python base ───────────────────────────────────────────────────────────
  - python=3.11
  - pip

  - pip:
    # CLIPper is not on Bioconda — install from GitHub
    # NOTE: CLIPper requires Python 2 for the original version; use the
    # community-maintained Python 3 fork or CLIPPER2 as a drop-in replacement.
    - git+https://github.com/YeoLab/clipper.git@master

    # researcher-ai (this project) for figure reproduction notebook
    - researcher-ai
