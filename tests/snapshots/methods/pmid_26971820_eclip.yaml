# Snapshot fixture: eCLIP paper (PMID 26971820)
# Van Nostrand et al. 2016, Nature Methods
#
# Source: manually curated from the published paper's Methods section.
# This is a frozen, static fixture — do NOT update without re-deriving from
# the live paper and committing the new expected_anchors.
#
# Usage: used by tests/test_methods_parser_snapshot.py (marked @pytest.mark.snapshot).
# These tests parse the frozen methods_text through MethodsParser with a mocked
# LLM that returns the frozen llm_responses below, then assert the anchors hold.

pmid: "26971820"
doi: "10.1038/nmeth.3810"
title: "Robust transcriptome-wide discovery of RNA-binding protein binding sites with enhanced CLIP (eCLIP)"

# Frozen methods section text excerpt (first ~1200 chars of actual methods).
# Trimmed to exclude supplementary-only content to keep the fixture self-contained.
methods_text: |
  Cell culture and UV crosslinking
  HEK293T cells were grown in DMEM supplemented with 10% FBS at 37°C with 5% CO2.
  Cells were UV crosslinked at 254 nm (400 mJ/cm2) on ice using a Stratalinker 2400.

  Immunoprecipitation and library preparation
  Whole-cell lysate was prepared in iCLIP lysis buffer. Anti-FLAG (Sigma F1804) or
  specific antibodies were used for immunoprecipitation. After on-bead RNA adapter
  ligation and proteinase K digestion, RNA was reverse transcribed with AffinityScript.
  Paired-end sequencing libraries were prepared using a modified eCLIP protocol.
  Libraries were sequenced on the Illumina HiSeq 2500 (2x75 bp).

  Computational analysis
  Raw reads were adapter-trimmed with Cutadapt (v1.9) and aligned to the hg19 genome
  using STAR (v2.4.0j) with --outFilterMultimapNmax 1. PCR duplicates were removed
  using a custom UMI-aware deduplication script. Peak calling was performed with
  CLIPper. eCLIP peaks were normalized against size-matched input controls to identify
  enriched binding sites.

