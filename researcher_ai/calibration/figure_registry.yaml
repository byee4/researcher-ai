version: 1
rules:
  - rule_id: pmc11633308_fig1_abc
    scope: paper
    enabled: true
    priority: 100
    match:
      pmcid: PMC11633308
      figure_id_pattern: "^fig(?:ure)?\\.?\\s*1$"
      panel_labels: ["a", "b", "c"]
    actions:
      plot_type: bar
      plot_category: composite
      layers: ["bar", "stacked_bar"]
      n_facets: 2
      facet_variable: left_right_panel
      confidence: 0.99
      evidence_tag: calibration_rule:pmc11633308_fig1_abc

