    memory  '8 GB'
    time    '2h'

    publishDir params.outdir, mode: params.publish_dir_mode

    input:
        path eclip_seq_data_processing_step6_input

    output:
        path "Merged 'Usable' reads BAM file", emit: out

    script:
    """
    custom_scripts merge_barcodes {per_barcode_deduplicated_bam_files} > {merged_usable_reads_bam}
    """
}

process ECLIP_SEQ_DATA_PROCESSING_STEP7 {
    conda "bioconda::clipper"
    cpus    4
    memory  '8 GB'
    time    '2h'

    publishDir params.outdir, mode: params.publish_dir_mode

    input:
        path eclip_seq_data_processing_step7_input

    output:
        path "CLIPper peak/cluster calls", emit: out

    script:
    """
    CLIPper ---s hg19 ---o true ----bonferroni true ----superlocal true ----threshold-method binomial ----save-pickle true --read_considered Read 2 only
    """
}

process ECLIP_SEQ_DATA_PROCESSING_STEP8 {
    cpus    4
    memory  '8 GB'
    time    '2h'

    publishDir params.outdir, mode: params.publish_dir_mode

    input:
        path eclip_seq_data_processing_step8_input

    output:
        path "RPM-normalized genome browser tracks", emit: out

    script:
    """
    Custom normalization scripts --normalization RPM (reads per million usable reads)
    """
}

process ECLIP_SEQ_DATA_PROCESSING_STEP9 {
    cpus    4
    memory  '8 GB'
    time    '2h'

    publishDir params.outdir, mode: params.publish_dir_mode

    input:
        path eclip_seq_data_processing_step9_input

    output:
        path "Usable read counts at various downsampled depths (100 iterations each)", emit: out

    script:
    """
    Custom downsampling scripts --iterations 100 --selection top N reads per iteration --note For iCLIP with multiple cDNA-size libraries, only library with highest percent usable was used
    """
}

process ECLIP_SEQ_DATA_PROCESSING_STEP10 {
    conda "bioconda::homer"
    cpus    4
    memory  '8 GB'
    time    '2h'

    publishDir params.outdir, mode: params.publish_dir_mode

    input:
        path eclip_seq_data_processing_step10_input

    output:
        path "De novo RNA motifs", emit: out

    script:
    """
    HOMER findMotifs ---p 4 ---rna true ---S 10 ---len 5,6,7,8,9 --background 3 random same-sized regions per cluster matched by genic region type (introns, 3′UTRs, etc.)
    """
}

process ECLIP_SEQ_DATA_PROCESSING_STEP11 {
    cpus    4
    memory  '8 GB'
    time    '2h'

    publishDir params.outdir, mode: params.publish_dir_mode

    input:
        path eclip_seq_data_processing_step11_input

    output:
        path "Cluster location pie charts", emit: out

    script:
    """
    custom_annotation_script --input {clipper_peaks} --output {pie_chart}
    """
}

process ECLIP_SEQ_DATA_PROCESSING_STEP12 {
    cpus    4
    memory  '8 GB'
    time    '2h'

    publishDir params.outdir, mode: params.publish_dir_mode

    input:
        path eclip_seq_data_processing_step12_input

    output:
        path "Peak counts per genic region type", emit: out

    script:
    """
    custom_annotation_script --input {clipper_peaks} --output {pie_chart}
    """
}

