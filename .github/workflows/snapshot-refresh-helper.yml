name: Snapshot Refresh Helper

on:
  pull_request:
    paths:
      - "tests/snapshots/**"
      - "tests/test_snapshot_refresh.py"
      - "researcher_ai/benchmarks/snapshot_refresh.py"
      - "scripts/refresh_snapshot_fixtures.py"
  workflow_dispatch:

jobs:
  snapshot-helper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install minimal test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml pytest
      - name: Validate snapshot refresh helper
        run: |
          pytest -q tests/test_snapshot_refresh.py
      - name: Print refresh instructions
        run: |
          python scripts/refresh_snapshot_fixtures.py

